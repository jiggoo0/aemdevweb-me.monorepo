<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ambient Glow -->
  <circle cx="60" cy="60" r="35" fill="#3B82F6" filter="blur(20px)" opacity="0.3" />
  
  <!-- Left Pillar (Back - Institutional Trust Blue) -->
  <path d="M25 110 L55 30 L75 30 L45 110 Z" fill="url(#primary-blue)" />
  
  <!-- Right Pillar (Front - Liquid Glass) -->
  <path d="M95 110 L65 30 L45 30 L75 110 Z" fill="url(#glass-white)" />
  
  <!-- Apex Cap (Ascension) -->
  <path d="M45 30 L75 30 L60 10 Z" fill="url(#apex-gradient)" />

  <!-- The Strategic Nodes (77 Provinces Strategy) -->
  <!-- Core Hub (Ethereal Gold) -->
  <circle cx="60" cy="70" r="7" fill="#FBBF24" /> 
  <!-- Radar Ripple (SEO Mapping) -->
  <circle cx="60" cy="70" r="14" stroke="#FBBF24" stroke-width="1.5" opacity="0.5" /> 
  
  <!-- Network Endpoints -->
  <circle cx="60" cy="10" r="4" fill="#FFFFFF" /> <!-- Apex Authority -->
  <circle cx="35" cy="110" r="4" fill="#60A5FA" /> <!-- Base Node 1 -->
  <circle cx="85" cy="110" r="4" fill="#60A5FA" /> <!-- Base Node 2 -->

  <defs>
    <linearGradient id="primary-blue" x1="25" y1="110" x2="75" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E3A8A"/> <!-- Slate/Deep Navy -->
      <stop offset="1" stop-color="#2563EB"/> <!-- Vibrant Corporate Blue -->
    </linearGradient>
    <linearGradient id="glass-white" x1="95" y1="110" x2="45" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="apex-gradient" x1="45" y1="30" x2="60" y2="10" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
</svg>